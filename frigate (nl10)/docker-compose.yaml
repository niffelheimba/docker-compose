services:
  frigate:
    container_name: frigate
    privileged: true
    restart: unless-stopped
    stop_grace_period: 30s
    image: ghcr.io/blakeblackshear/frigate:v0.18.0-beta1
    shm_size: "768mb"

    entrypoint: >
      sh -c 'sleep 90;
      until [ -f /media/frigate/.nas-ready ]; do
        echo "Waiting for NAS mount /media/frigate...";
        sleep 10;
      done;
      exec /init'

    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/Frigate/config:/config
      - /mnt/Frigate:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 3000000000
          
    ports:
      - "8971:8971" #UI port, remember publishing ports bypasses ufw firewall
      # - "5000:5000" # Internal unauthenticated access. Expose carefully.
      - "8554:8554" # RTSP feeds
      - "8555:8555/tcp" # WebRTC over tcp
      - "8555:8555/udp" # WebRTC over udp
      - "1984:1984" #go2rtc
    mem_limit: 8g
    security_opt:
      - no-new-privileges:true

#    env_file:
#      - stack.env
volumes:
  frigate:
    driver: local
    driver_opts:
        type: "nfs4"
        o: "addr=10.10.60.250,nolock,hard,rw"
        device: ":/mnt/NAS1/NFS/Frigate"
