http:
  routers: ################################################
    karakeep:
      rule: Host(`karakeep.northlake.dev`)
      entryPoints:
        - websecure
      service: karakeep
      tls:
        certResolver: letsencrypt
    frigate:
      rule: Host(`frigate.northlake.dev`,`frigate.home.northlake.dev`)
      entryPoints:
        - websecure
      service: frigate
      tls:
        certResolver: letsencrypt
    homeassistant:
      rule: Host(`homeassistant.northlake.dev`)
      entryPoints:
        - websecure
      service: homeassistant
      tls:
        certResolver: letsencrypt
    pve1:
      rule: Host(`pve1.home.northlake.dev`)
      entryPoints:
        - websecure
      service: pve1
      middlewares:
        - private-net
      tls:
        certResolver: letsencrypt
    pve2:
      rule: Host(`pve2.home.northlake.dev`)
      entryPoints:
        - websecure
      service: pve2
      middlewares:
        - private-net
      tls:
        certResolver: letsencrypt
    picpeak:
      rule: Host(`picpeak.northlake.dev`)
      entryPoints:
        - websecure
      service: picpeak
      tls:
        certResolver: letsencrypt
    kanidm:
      rule: Host(`idm.northlake.dev`)
      entryPoints:
        - websecure
      service: kanidm
      tls:
        certResolver: letsencrypt
    nicholas_actualbudget:
      rule: Host(`nicholas.actualbudget.home.northlake.dev`)
      entryPoints:
        - websecure
      service: nicholas_actualbudget
      tls:
        certResolver: letsencrypt
    family_actualbudget:
      rule: Host(`family.actualbudget.home.northlake.dev`)
      entryPoints:
        - websecure
      service: family_actualbudget
      tls:
        certResolver: letsencrypt
    amp:
      rule: Host(`amp.northlake.dev`)
      entryPoints:
        - websecure
      service: amp
      middlewares:
        - private-net
      tls:
        certResolver: letsencrypt
  middlewares: ################################################
    private-net:
      ipAllowList:
        sourceRange:
          - 10.0.0.0/8
          - 100.86.0.0/16
  services: ################################################
    karakeep:
      loadBalancer:
        servers:
          - url: http://10.10.60.200:3000
    frigate:
      loadBalancer:
        servers:
          - url: http://10.10.60.200:8971
    homeassistant:
      loadBalancer:
        servers:
          - url: http://10.10.60.155:9999
    pve1:
      loadBalancer:
        servers:
          - url: https://10.10.70.100:8006
        serversTransport: pve1-transport
    pve2:
      loadBalancer:
        servers:
          - url: https://10.10.70.200:8006
        serversTransport: pve2-transport
    picpeak:
      loadBalancer:
        servers:
          - url: http://10.10.50.253:3000
    kanidm:
      loadBalancer:
        servers:
          - url: https://10.10.50.100:8443
        serversTransport: kanidm-transport
    nicholas_actualbudget:
      loadBalancer:
        servers:
          - url: http://10.10.60.200:5006
    family_actualbudget:
      loadBalancer:
        servers:
          - url: http://10.10.60.200:5007
    amp:
      loadBalancer:
        servers:
          - url: http://10.10.50.50:8080
  serversTransports: ################################################
    pve1-transport:
      insecureSkipVerify: true
    pve2-transport:
      insecureSkipVerify: true
    kanidm-transport:
      insecureSkipVerify: true
