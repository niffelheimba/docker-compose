http:
  routers: ################################################
    karakeep:
      rule: Host(`karakeep.northlake.dev`)
      entryPoints:
        - websecure
      service: karakeep
      tls:
        certResolver: letsencrypt

    # Redirect the legacy Frigate hostname to the OAuth-protected host.
    frigate_redirect:
      rule: Host(`frigate.northlake.dev`)
      entryPoints:
        - websecure
      service: frigate
      middlewares:
        - frigate-redirect-to-home
      tls:
        certResolver: letsencrypt

    # Frigate should use oauth2-proxy on the canonical hostname.
    frigate:
      rule: Host(`frigate.home.northlake.dev`)
      entryPoints:
        - websecure
      service: frigate
      middlewares:
        - frigate-oauth-errors
        - frigate-oauth-auth
        - frigate-proxy-secret
      tls:
        certResolver: letsencrypt

    # REQUIRED:
    # This exposes oauth2-proxy's /oauth2/* endpoints on the canonical hostname.
    # KanIDM redirect URI example:
    #   https://frigate.home.northlake.dev/oauth2/callback
    frigate_oauth2:
      rule: Host(`frigate.home.northlake.dev`) && PathPrefix(`/oauth2/`)
      entryPoints:
        - websecure
      service: oauth2-proxy
      middlewares:
        - auth-headers
      tls:
        certResolver: letsencrypt

    homeassistant:
      rule: Host(`homeassistant.northlake.dev`)
      entryPoints:
        - websecure
      service: homeassistant
      tls:
        certResolver: letsencrypt

    pve1:
      rule: Host(`pve1.home.northlake.dev`)
      entryPoints:
        - websecure
      service: pve1
      middlewares:
        - private-net
      tls:
        certResolver: letsencrypt

    pve2:
      rule: Host(`pve2.home.northlake.dev`)
      entryPoints:
        - websecure
      service: pve2
      middlewares:
        - private-net
      tls:
        certResolver: letsencrypt

    # TrueNAS is reachable only from approved networks and now also requires
    # a client certificate trusted by the mTLS option attached below.
    truenas:
      rule: Host(`truenas.home.northlake.dev`)
      entryPoints:
        - websecure
      service: truenas
      middlewares:
        - private-net
        - truenas-client-cert-info
        - truenas-revocation-check
      tls:
        certResolver: letsencrypt
        # ===== mTLS: TrueNAS client-certificate gate =====
        # Require clients to present a certificate signed by the Northlake Identity Issuing CA.
        options: truenas-client-mtls@file

    picpeak:
      rule: Host(`picpeak.northlake.dev`)
      entryPoints:
        - websecure
      service: picpeak
      tls:
        certResolver: letsencrypt

    kanidm:
      rule: Host(`idm.northlake.dev`)
      entryPoints:
        - websecure
      service: kanidm
      tls:
        certResolver: letsencrypt

    nicholas_actualbudget:
      rule: Host(`nicholas.actualbudget.home.northlake.dev`)
      entryPoints:
        - websecure
      service: nicholas_actualbudget
      tls:
        certResolver: letsencrypt

    family_actualbudget:
      rule: Host(`family.actualbudget.home.northlake.dev`)
      entryPoints:
        - websecure
      service: family_actualbudget
      tls:
        certResolver: letsencrypt

    jacob_actualbudget:
      rule: Host(`jacob.actualbudget.home.northlake.dev`)
      entryPoints:
        - websecure
      service: jacob_actualbudget
      tls:
        certResolver: letsencrypt

    amp:
      rule: Host(`amp.northlake.dev`)
      entryPoints:
        - websecure
      service: amp
      middlewares:
        - private-net
      tls:
        certResolver: letsencrypt

    jellyfin:
      rule: Host(`stream.home.northlake.dev`)
      entryPoints:
        - websecure
      service: jellyfin
      tls:
        certResolver: letsencrypt

  middlewares: ################################################
    private-net:
      # Keep home-only services off the open internet even before app auth runs.
      ipAllowList:
        sourceRange:
          - 10.0.0.0/8
          - 100.86.0.0/16

    # ===== mTLS: TrueNAS certificate metadata for revocation =====
    # Traefik has already verified the client certificate chain at the TLS layer.
    # This middleware exposes only the selected cert fields needed by the
    # revocation checker; it does not forward the full certificate PEM.
    truenas-client-cert-info:
      passTLSClientCert:
        info:
          serialNumber: true
          notAfter: true
          notBefore: true
          subject:
            commonName: true
            organization: true
          issuer:
            commonName: true
            organization: true

    # ===== mTLS: TrueNAS OpenBao revocation gate =====
    # Denies revoked or unknown OpenBao-issued client cert serials before the
    # request reaches the TrueNAS backend.
    truenas-revocation-check:
      forwardAuth:
        address: http://mtls-revocation-checker:8080/auth
        trustForwardHeader: true
        # The checker returns tiny JSON responses; cap the auth response body so
        # Traefik cannot buffer an unbounded response from the auth service.
        maxResponseBodySize: 8192

    # Traefik asks oauth2-proxy whether the request is authenticated.
    # oauth2-proxy returns 202 if valid, 401 if not.
    frigate-oauth-auth:
      forwardAuth:
        address: http://frigate-oauth2-proxy:4180/oauth2/auth
        trustForwardHeader: true
        authResponseHeaders:
          - X-Auth-Request-User
          - X-Auth-Request-Email
          - X-Auth-Request-Groups

    # If oauth2-proxy returns 401/403, send browser to oauth2-proxy sign-in.
    frigate-oauth-errors:
      errors:
        status:
          - "401-403"
        service: oauth2-proxy
        query: "/oauth2/sign_in?rd={url}"
        statusRewrites:
          "401": 302

    frigate-redirect-to-home:
      redirectRegex:
        regex: '^https?://frigate\.northlake\.dev(?:/.*)?$'
        replacement: 'https://frigate.home.northlake.dev'
        permanent: true

    # Defined in config/.dynamic_secrets.local.yml, not here:
    #
    # frigate-proxy-secret:
    #   headers:
    #     customRequestHeaders:
    #       X-Proxy-Secret: "SECRET_VALUE"

    auth-headers:
      headers:
        sslRedirect: true
        stsSeconds: 315360000
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true

  services: ################################################
    karakeep:
      loadBalancer:
        servers:
          - url: http://10.10.60.200:3000

    frigate:
      loadBalancer:
        servers:
          - url: http://10.10.60.200:8971

    # oauth2-proxy itself, not Frigate.
    # Assumes oauth2-proxy is listening on 10.10.60.200:4180.
    oauth2-proxy:
      loadBalancer:
        servers:
          - url: http://frigate-oauth2-proxy:4180

    homeassistant:
      loadBalancer:
        servers:
          - url: http://10.10.60.155:9999

    pve1:
      loadBalancer:
        servers:
          - url: https://10.10.70.100:8006
        serversTransport: pve1-transport

    pve2:
      loadBalancer:
        servers:
          - url: https://10.10.70.200:8006
        serversTransport: pve2-transport

    # TrueNAS uses HTTPS upstream with a local/self-signed certificate, so the
    # matching serversTransport below disables upstream certificate validation.
    # Client-facing TLS is still terminated by Traefik.
    truenas:
      loadBalancer:
        servers:
          - url: https://10.10.60.250
        serversTransport: truenas-transport

    picpeak:
      loadBalancer:
        servers:
          - url: http://10.10.50.253:3000

    kanidm:
      loadBalancer:
        servers:
          - url: https://10.10.50.100:8443
        serversTransport: kanidm-transport

    nicholas_actualbudget:
      loadBalancer:
        servers:
          - url: http://10.10.60.200:5006

    family_actualbudget:
      loadBalancer:
        servers:
          - url: http://10.10.60.200:5007

    jacob_actualbudget:
      loadBalancer:
        servers:
          - url: http://10.10.60.200:5008

    amp:
      loadBalancer:
        servers:
          - url: http://10.10.50.50:8080

    jellyfin:
      loadBalancer:
        servers:
          - url: http://10.10.60.6:8096



  serversTransports: ################################################
    pve1-transport:
      insecureSkipVerify: true

    pve2-transport:
      insecureSkipVerify: true

    truenas-transport:
      # Upstream-only setting for the TrueNAS backend certificate.
      # This is separate from client-certificate verification at Traefik.
      insecureSkipVerify: true

    kanidm-transport:
      insecureSkipVerify: true

# ===== mTLS: certificate authorities and client-auth policies =====
# This is intentionally outside the "http" tree. Traefik TLS options are
# top-level dynamic config and can be attached per-router with tls.options.
tls:
  options:
    truenas-client-mtls:
      # Traefik still serves the public LetsEncrypt certificate for the hostname.
      # This issuing CA is only used to verify client certificates presented by
      # browsers, apps, or automation that connect to the TrueNAS router.
      # TLS 1.2 is capped here because RSA-backed YubiKey PIV client auth can
      # fail TLS 1.3 handshakes when the smart-card provider cannot produce the
      # requested RSA-PSS client-certificate signature.
      maxVersion: VersionTLS12
      clientAuth:
        clientAuthType: RequireAndVerifyClientCert
        caFiles:
          - /etc/traefik/dynamic/certs/northlake-identity-issuing-ca-01.crt.pem
          - /etc/traefik/dynamic/certs/northlake-root-ca.crt.pem
