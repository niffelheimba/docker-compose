services:
  traefik:
    image: traefik:v3.4.0
    container_name: traefik
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - '80:80'
      - '443:443'
    command:
      - --global.sendAnonymousUsage=false
      - --api.dashboard=false
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.websecure.http.tls.certResolver=letsencrypt
      - --providers.docker=false
      - --providers.file.filename=/etc/traefik/dynamic_config.yml
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.email=nd.personal@icloud.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --log.level=info
      - --log.format=common
    volumes:
      - ./letsencrypt:/letsencrypt
      - ./logs:/var/log/traefik
      - ./dynamic_config.yml:/etc/traefik/dynamic_config.yml:ro
    networks:
      - traefik-net

  # Template for adding a new public container route:
  # my-service:
  #   image: alpine:3.18
  #   command: ["sh", "-c", "sleep infinity"]
  #   restart: unless-stopped
  #   labels:
  #     - traefik.enable=true
  #     - traefik.http.routers.my-service.rule=Host(`my.domain.dev`) && PathPrefix(`/path`)
  #     - traefik.http.routers.my-service.entrypoints=websecure
  #     - traefik.http.routers.my-service.tls=true
  #     - traefik.http.routers.my-service.tls.certresolver=letsencrypt
  #     - traefik.http.services.my-service.loadbalancer.server.url=http://10.10.60.200:1234
  #   networks:
  #     - traefik-net

networks:
  traefik-net:
    driver: bridge