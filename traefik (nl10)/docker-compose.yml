services:
  traefik:
    image: traefik:v3.7.1
    container_name: traefik
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - '80:80'
      - '443:443'
    command:
      - --global.sendAnonymousUsage=false
      - --api.dashboard=false
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.websecure.http.tls.certResolver=letsencrypt

      - --providers.docker=false

      # Changed from single-file provider to directory provider.
      # This lets Traefik load both:
      #   /etc/traefik/dynamic/dynamic_config.yml
      #   /etc/traefik/dynamic/.dynamic_secrets.local.yml
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true

      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.email=nd.personal@icloud.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json

      - --log.level=info
      - --log.format=common

    volumes:
      - /home/service/docker-state/traefik/letsencrypt:/letsencrypt
      - /home/service/docker-state/traefik/logs:/var/log/traefik

      # Changed from mounting one file to mounting the whole config directory.
      - ./config:/etc/traefik/dynamic:ro

    networks:
      - traefik-net

networks:
  traefik-net:
    driver: bridge