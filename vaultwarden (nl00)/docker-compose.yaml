services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://vault.northlake.dev"
    volumes:
      - ./vw-data/:/data/
    ports:
      - 127.0.0.1:8000:80
    networks:
      - vaultwarden-net

networks:
  vaultwarden-net:
    external: true
